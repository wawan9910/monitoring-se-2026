<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin – Monitoring SE 2026</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
}
.box {
  background:white; border-radius:20px; padding:40px 36px;
  width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.logo { text-align:center; margin-bottom:28px; }
.logo h1 { font-size:22px; color:#1a1a2e; font-weight:800; }
.logo h1 span { color:#e94560; }
.logo p { font-size:12px; color:#9ca3af; margin-top:4px; }
.form-group { margin-bottom:18px; }
label { font-size:13px; font-weight:600; color:#374151; display:block; margin-bottom:6px; }
input {
  width:100%; padding:11px 14px; border:1.5px solid #e5e7eb;
  border-radius:10px; font-size:14px; outline:none;
  transition:border-color .2s,box-shadow .2s;
}
input:focus { border-color:#0f3460; box-shadow:0 0 0 3px rgba(15,52,96,.1); }
.btn {
  width:100%; padding:12px; background:linear-gradient(135deg,#0f3460,#1a1a2e);
  color:white; border:none; border-radius:10px; font-size:15px; font-weight:700;
  cursor:pointer; transition:opacity .2s,transform .15s;
}
.btn:hover { opacity:.9; transform:translateY(-1px); }
.error {
  background:#fee2e2; color:#991b1b; border-radius:9px;
  padding:10px 14px; font-size:13px; margin-bottom:16px;
}
.back { text-align:center; margin-top:16px; }
.back a { font-size:13px; color:#6b7280; text-decoration:none; }
.back a:hover { color:#0f3460; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <h1>📊 Monitoring <span>SE 2026</span></h1>
    <p>Masuk sebagai Admin untuk mengelola data</p>
  </div>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Password Admin</label>
      <input type="password" name="password" placeholder="Masukkan password..." autofocus required>
    </div>
    <button type="submit" class="btn">Masuk →</button>
  </form>
  <div class="back"><a href="/">← Kembali ke Dashboard</a></div>
</div>
</body>
</html>
