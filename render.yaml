services:
  - type: web
    name: monitoring-se-2026
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123
      - key: DATABASE_URL
        fromDatabase:
          name: monitoring-db
          property: connectionString

databases:
  - name: monitoring-db
    databaseName: monitoring_se
    user: admin
